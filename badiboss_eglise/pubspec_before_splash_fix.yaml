name: badiboss_eglise
description: Application Badiboss Eglise
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # HTTP
  http: ^1.2.1

  # Local secure storage (token, role, etc.)
  flutter_secure_storage: ^9.2.2

  # (Optionnel) si tu utilises shared_preferences quelque part, décommente:
  # shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # App icon
  flutter_launcher_icons: ^0.13.1

  # Splash screen
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/logo_badiboss.jpg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo_badiboss.jpg"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0B6E2E"
  image: assets/logo_badiboss.jpg
  android: true
  ios: true
  android_12:
    color: "#0B6E2E"
    image: assets/logo_badiboss.jpg
