def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterRoot = localProperties.getProperty('flutter.sdk')
if (flutterRoot == null) {
    throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

apply plugin: 'com.android.application'
apply plugin: 'kotlin-android'
apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.badiboss.badiboss_eglise"
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.badiboss.badiboss_eglise"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile file(keystoreProperties['storeFile'])
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
}
// --- BADIBOSS FIX: ensure Flutter can find the debug/release APK (SAFE) ---
def flutterApkOutDir = new File(rootProject.projectDir, "../build/app/outputs/flutter-apk")

tasks.register("copyFlutterApkDebug") {
    doLast {
        def src = new File(buildDir, "outputs/apk/debug/app-debug.apk")
        def dstDir = flutterApkOutDir
        def dst = new File(dstDir, "app-debug.apk")
        if (!src.exists()) {
            println("copyFlutterApkDebug: source not found -> " + src.absolutePath)
            return
        }
        dstDir.mkdirs()
        ant.copy(file: src, tofile: dst, overwrite: true)
        println("copyFlutterApkDebug: copied -> " + dst.absolutePath)
    }
}

tasks.register("copyFlutterApkRelease") {
    doLast {
        def src = new File(buildDir, "outputs/apk/release/app-release.apk")
        def dstDir = flutterApkOutDir
        def dst = new File(dstDir, "app-release.apk")
        if (!src.exists()) {
            println("copyFlutterApkRelease: source not found -> " + src.absolutePath)
            return
        }
        dstDir.mkdirs()
        ant.copy(file: src, tofile: dst, overwrite: true)
        println("copyFlutterApkRelease: copied -> " + dst.absolutePath)
    }
}

tasks.matching { it.name == "assembleDebug" }.configureEach {
    finalizedBy("copyFlutterApkDebug")
}
tasks.matching { it.name == "assembleRelease" }.configureEach {
    finalizedBy("copyFlutterApkRelease")
}
// --- END FIX ---
