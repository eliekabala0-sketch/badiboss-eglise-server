include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # On désactive temporairement les "issues" non bloquantes
    prefer_const_constructors: ignore
    prefer_const_constructors_in_immutables: ignore
    use_build_context_synchronously: ignore
    curly_braces_in_flow_control_structures: ignore

    # Warning que tu vois sur setState (protected member)
    invalid_use_of_protected_member: ignore

    # Bruit (facultatif)
    unnecessary_import: ignore
    unused_import: ignore
    unused_element: ignore
    dangling_library_doc_comments: ignore

linter:
  rules:
    prefer_const_constructors: false
    prefer_const_constructors_in_immutables: false
    use_build_context_synchronously: false
    curly_braces_in_flow_control_structures: false
