name: badiboss_eglise
description: Application Badiboss Église
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.2
  provider: ^6.1.2
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2





dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^4.0.0
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo_badiboss.jpg
    - assets/splash.jpg

flutter_icons:
  android: true
  ios: true
  image_path: assets/logo_badiboss.jpg
  min_sdk_android: 21

flutter_native_splash:
  color: "#0B6E2E"
  image: assets/images/splash.png
  android: true
  ios: true
  android_12:
    color: "#0B6E2E"
    image: assets/images/splash.png
